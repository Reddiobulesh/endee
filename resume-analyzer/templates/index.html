<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 850px;
            margin: auto;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
        h2 { color: #22c55e; margin-top: 0; font-size: 28px; }
        #messages {
            height: 450px;
            overflow-y: auto;
            background: #0f172a;
            padding: 25px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 25px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }
        .user-msg {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-msg {
            align-self: flex-start;
            background: #334155;
            color: #f8fafc;
            border-bottom-left-radius: 4px;
            border: 1px solid #475569;
        }
        .loading-text { color: #94a3b8; font-style: italic; }
        input[type="text"] {
            flex-grow: 1;
            padding: 18px 24px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 20px;
            min-width: 300px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]::placeholder {
            font-size: 18px;
            color: #94a3b8;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        button {
            padding: 12px 24px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }
        .btn-blue { background: #3b82f6; }
        .btn-gray { background: #64748b; }
        .btn-red { background: #ef4444; }
        
        #status { font-size: 16px; margin-top: 15px; color: #94a3b8; }
        
        .action-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .right-actions {
            display: flex;
            gap: 10px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .skills-tag {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #3b82f6;
            color: #38bdf8;
            padding: 6px 14px;
            border-radius: 20px;
            margin: 6px;
            font-size: 14px;
            font-weight: 500;
        }
        .suggestion-btn {
            display: block;
            background: #1e293b;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 15px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: all 0.2s;
        }
        .suggestion-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: #0f172a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🎯 AI Resume Analyzer</h2>
        <p>Upload a PDF to extract skills and start chatting.</p>
        
        <div class="controls">
            <input type="file" id="pdfUpload" accept=".pdf" style="display:none" onchange="updateFileName()">
            <button onclick="document.getElementById('pdfUpload').click()" class="btn-blue">📁 Upload PDF</button>
            <div class="right-actions" style="display:inline-flex; margin-left:20px;">
                <button onclick="getSkills()" class="btn-gray">🔍 View Skills</button>
                <button onclick="checkATS()" class="btn-blue">⭐ Check ATS Score</button>
                <button onclick="removeResume()" class="btn-red">🗑️ Remove PDF</button>
            </div>
        </div>
        <div id="status">Ready</div>
        <div id="skillsList" style="margin-top:10px"></div>
    </div>

    <div class="card">
        <div id="messages">
            <div class="msg"><span class="bot-label">Bot:</span> Hello! Upload a resume and ask me anything.</div>
        </div>
        <div class="controls">
            <input id="question" placeholder="e.g. What are the top skills?" onkeypress="if(event.key=='Enter')send()">
            <button onclick="send()">Send</button>
            <button onclick="clearChat()" class="btn-gray">Clear</button>
        </div>
    </div>
</div>

<script>
function updateFileName() {
    let file = document.getElementById('pdfUpload').files[0];
    if (file) {
        document.getElementById('status').innerHTML = `<span style="color:#38bdf8">📄 Your PDF is selected: <b>${file.name}</b></span>`;
        uploadPDF(); // Auto-upload on selection
    }
}

async function uploadPDF() {
    let file = document.getElementById('pdfUpload').files[0];
    if(!file) return alert("Select a PDF first!");
    
    let fd = new FormData();
    fd.append('file', file);
    
    document.getElementById('status').innerText = "Uploading...";
    let res = await fetch("/upload", {method:"POST", body:fd});
    let data = await res.json();
    
    if(data.error) {
        document.getElementById('status').innerHTML = `<span style="color:#ef4444">${data.error}</span>`;
    } else {
        document.getElementById('status').innerHTML = `<span style="color:#22c55e">✅ Your PDF is uploaded successfully</span>`;
    }
}

async function checkATS() {
    document.getElementById('status').innerText = "Analyzing ATS Score...";
    try {
        let res = await fetch("/ats");
        let data = await res.json();
        if(data["ATS Score"] !== undefined) {
            document.getElementById('status').innerHTML = `<span style="color:#38bdf8; font-size:20px;">🚀 <b>ATS Score: ${data["ATS Score"]}%</b></span>`;
            
            let skillHtml = `<div style="margin-top:15px; text-align:left; background:#0f172a; padding:15px; border-radius:10px; border:1px solid #334155;">`;
            skillHtml += `<b style="color:#22c55e">✅ Matching:</b> ${data["Matching Skills"].join(", ") || "None"}<br>`;
            skillHtml += `<b style="color:#ef4444">❌ Missing:</b> ${data["Missing Skills"].join(", ") || "None"}`;
            skillHtml += `</div>`;
            document.getElementById('skillsList').innerHTML = skillHtml;
        } else {
            alert(data.error || "Could not calculate ATS score.");
        }
    } catch (e) {
        alert("Error connecting to ATS service.");
    }
}

async function getSkills() {
    let res = await fetch("/skills");
    let data = await res.json();
    if(data.skills) displaySkills(data.skills);
    else alert(data.error || "No skills found");
}

async function removeResume() {
    if(!confirm("Are you sure you want to remove the resume and all associated data?")) return;
    
    let res = await fetch("/remove_resume", {method:"POST"});
    let data = await res.json();
    
    if(data.error) {
        alert(data.error);
    } else {
        document.getElementById('status').innerHTML = "Ready";
        document.getElementById('skillsList').innerHTML = "";
        document.getElementById('pdfUpload').value = "";
        alert(data.message);
    }
}

function displaySkills(skills) {
    let html = "<strong>Found Skills:</strong><br>";
    skills.forEach(s => {
        html += `<span class="skills-tag">${s}</span>`;
    });
    document.getElementById('skillsList').innerHTML = html;
}

async function send() {
    let q = document.getElementById("question").value;
    if(!q) return;
    document.getElementById("question").value = "";
    
    let msgBox = document.getElementById("messages");
    msgBox.innerHTML += `<div class="msg user-msg">${q}</div>`;
    
    // Add loading indicator
    let loadingId = "loading-" + Date.now();
    msgBox.innerHTML += `<div class="msg bot-msg" id="${loadingId}"><span class="loading-text">Thinking...</span></div>`;
    msgBox.scrollTop = msgBox.scrollHeight;

    try {
        let res = await fetch("/ask", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({question:q})
        });
        let data = await res.json();
        
        // Replace loading with actual answer
        let botMsg = document.getElementById(loadingId);
        botMsg.innerHTML = data.answer || data.error;

        if(data.suggestions) {
            let suggestHtml = `<div style="margin-top:10px;">`;
            data.suggestions.forEach(s => {
                suggestHtml += `<button class="suggestion-btn" onclick="askSuggestion('${s}')">💡 ${s}</button>`;
            });
            suggestHtml += `</div>`;
            botMsg.innerHTML += suggestHtml;
        }
    } catch (e) {
        document.getElementById(loadingId).innerHTML = `<span style="color:#ef4444">Error connecting to server.</span>`;
    }
    msgBox.scrollTop = msgBox.scrollHeight;
}

function askSuggestion(question) {
    document.getElementById("question").value = question;
    send();
}

function clearChat() {
    document.getElementById("messages").innerHTML = `<div class="msg bot-msg">Hello! Chat history cleared. Ask me anything.</div>`;
}
</script>

</body>
</html>
